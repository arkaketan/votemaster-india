function log(msg) {
  document.getElementById('log').textContent += '\n' + msg;
}

function b64ToBlob(b64Data, contentType) {
  const byteChars = atob(b64Data);
  const byteArrays = [];
  for (let i = 0; i < byteChars.length; i += 512) {
    const slice = byteChars.slice(i, i + 512);
    const byteNums = new Array(slice.length);
    for (let j = 0; j < slice.length; j++) byteNums[j] = slice.charCodeAt(j);
    byteArrays.push(new Uint8Array(byteNums));
  }
  return new Blob(byteArrays, {type: contentType});
}

async function deploy() {
  try {
    log('Decoding zip...');
    const blob = b64ToBlob(B64, 'application/zip');
    log('Zip size: ' + blob.size + ' bytes');
    log('Calling Netlify API...');
    
    const resp = await fetch('https://api.netlify.com/api/v1/sites/' + SITE_ID + '/deploys', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + TOKEN,
        'Content-Type': 'application/zip',
      },
      body: blob,
    });
    
    const text = await resp.text();
    log('Status: ' + resp.status);
    log('Response: ' + text.substring(0, 500));
    
    if (resp.ok) {
      const data = JSON.parse(text);
      log('\n✅ Deploy started! ID: ' + data.id);
      log('State: ' + data.state);
      log('URL: https://votemaster-india.netlify.app');
    } else {
      log('\n❌ Deploy failed: ' + text);
    }
  } catch(e) {
    log('\n❌ Error: ' + e.message);
  }
}

deploy();
</script>
