[build]
  publish = "."
  command  = ""

[functions]
  directory      = "netlify/functions"
  included_files = ["scrapers/**"]

# ── API routes → single Python function ──────────────────────────────
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

# ── Everything else → index.html (SPA fallback) ──────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
