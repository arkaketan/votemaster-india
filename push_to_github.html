const log = m => { document.getElementById("log").textContent += m + "\n"; console.log(m); };

async function pushFile(path, b64content) {
  const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`;
  // check if file exists (get sha)
  let sha = undefined;
  try {
    const chk = await fetch(url, {headers:{"Authorization":"token "+TOKEN,"Accept":"application/vnd.github.v3+json"}});
    if (chk.ok) { const d = await chk.json(); sha = d.sha; }
  } catch(e) {}
  
  const body = {message: `Add ${path}`, content: b64content};
  if (sha) body.sha = sha;
  
  const r = await fetch(url, {
    method: "PUT",
    headers: {"Authorization":"token "+TOKEN,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"},
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`${r.status}: ${t.substring(0,200)}`);
  }
  return r.ok;
}

async function main() {
  const paths = Object.keys(FILES);
  log(`Pushing ${paths.length} files to github.com/${OWNER}/${REPO}...`);
  let ok = 0, fail = 0;
  for (const path of paths) {
    try {
      await pushFile(path, FILES[path]);
      log(`  ✅ ${path}`);
      ok++;
    } catch(e) {
      log(`  ❌ ${path}: ${e.message}`);
      fail++;
    }
    // small delay to avoid rate limiting
    await new Promise(r => setTimeout(r, 300));
  }
  log(`\nDone! ${ok} pushed, ${fail} failed.`);
  if (fail === 0) log("\n🎉 All files pushed! Now connect repo to Render.");
}

main().catch(e => log("Fatal: " + e.message));
